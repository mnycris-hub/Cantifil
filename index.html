<!doctype html>
<html lang="pt">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Grupo Cantifil B2B</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ["Playfair Display", "serif"],
              sans: ["Manrope", "sans-serif"]
            },
            colors: {
              ink: {
                950: "#0b0b0b",
                900: "#141414",
                800: "#1c1c1c",
                700: "#2a2a2a",
                600: "#3b3b3b"
              },
              sand: {
                50: "#faf7f2",
                100: "#f3ede3",
                200: "#e6dccd",
                300: "#d5c4ad",
                400: "#c1a786",
                500: "#a68562"
              },
              brass: {
                500: "#b08a54",
                600: "#8e6c3e"
              },
              moss: {
                500: "#5c6c5b"
              }
            },
            boxShadow: {
              soft: "0 12px 30px rgba(11,11,11,0.12)",
              lift: "0 18px 50px rgba(11,11,11,0.18)"
            },
            backgroundImage: {
              grain: "radial-gradient(circle at 1px 1px, rgba(0,0,0,0.08) 1px, transparent 0)",
              aurora: "linear-gradient(120deg, rgba(176,138,84,0.35), rgba(92,108,91,0.35), rgba(193,167,134,0.35))"
            }
          }
        }
      };
    </script>
  </head>
  <body>
    <main class="min-h-screen bg-aurora">
      <div class="section-shell py-20">
        <div class="card p-10 backdrop-blur">
          <p class="badge bg-ink-900 text-sand-50">Grupo Cantifil B2B</p>
          <h1 class="mt-6 text-4xl md:text-5xl font-display text-ink-900">
            Premium partner portal for high-end furniture and decor.
          </h1>
          <p class="mt-4 text-lg text-ink-700 max-w-2xl">
            Centralize catalog, stock, pricing, projects, and negotiations in one elegant workspace.
          </p>
          <div class="mt-8 flex flex-wrap gap-4">
            <a class="px-6 py-3 rounded-full bg-ink-900 text-sand-50" href="#">Client Login</a>
            <a class="px-6 py-3 rounded-full border border-ink-900" href="#">Business Registration</a>
            <a class="px-6 py-3 rounded-full bg-moss-500 text-white" href="#">Admin Area</a>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
